name: Autonomous SEO blog writer

# Fully hands-off content engine — runs daily, keeps the LIVE site fresh.
#
# Pipeline:
#   1. Generate article(s) with the bot
#   2. Commit + push content (this triggers Vercel/Netlify auto-deploy from main)
#   3. (Optional) Hit DEPLOY_HOOK_URL if a non-Git-integrated host needs it
#   4. Wait for the deploy to land, then ping IndexNow so Bing/Yandex/Seznam/Naver
#      index the new URLs in minutes (Google ignores IndexNow but uses Search
#      Console — submit your sitemap there once)
#   5. Commit + push the drained ping queue
#
# Setup once (Repo → Settings → Secrets and variables → Actions):
#   AI_GATEWAY_API_KEY    your Vercel AI Gateway key      (required)
#   AI_GATEWAY_MODEL      anthropic/claude-haiku-4.5      (optional)
#   NEXT_PUBLIC_SITE_URL  https://yourdomain.com          (recommended for
#                                                          correct IndexNow URLs)
#   DEPLOY_HOOK_URL       https://api.vercel.com/v1/...   (optional — only if
#                                                          your host is NOT
#                                                          Git-connected)

on:
  schedule:
    # 04:30 UTC daily ≈ 10:00 IST. Tune cadence here.
    - cron: "30 4 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "How many articles to publish this run"
        required: false
        default: "1"

permissions:
  contents: write

concurrency:
  group: auto-blog
  cancel-in-progress: false

jobs:
  write:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate article(s)
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          AI_GATEWAY_MODEL: ${{ secrets.AI_GATEWAY_MODEL || 'anthropic/claude-haiku-4.5' }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'http://localhost:3000' }}
        run: pnpm bot --count=${{ github.event.inputs.count || '1' }}

      - name: Commit & push new content
        id: publish
        run: |
          git config user.name  "compound-bot"
          git config user.email "bot@users.noreply.github.com"
          NEW_SLUGS=$(git status --porcelain content/blog/ | awk '{print $2}' | sed -E 's|.*/||;s|\.mdx$||' | head -5 | paste -sd ', ')
          if [ -n "$(git status --porcelain content/blog public/blog public/*.txt bot/memory.json 2>/dev/null)" ]; then
            git add content/blog public/blog public/*.txt bot/memory.json 2>/dev/null || true
            git add content/blog public/blog bot/memory.json
            git commit -m "content: ${NEW_SLUGS:-autonomous SEO article(s)} $(date -u +%F)"
            git push
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new content produced."
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger explicit deploy hook (optional)
        if: steps.publish.outputs.published == 'true' && env.DEPLOY_HOOK_URL != ''
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
        run: curl -sf -X POST "$DEPLOY_HOOK_URL" || echo "deploy hook returned non-200 (continuing)"

      - name: Wait for deploy to land
        if: steps.publish.outputs.published == 'true'
        run: |
          # Most Vercel deploys for a content-only push finish in 60–120s.
          # 4 min is a safe ceiling; IndexNow rejects if the key file isn't live.
          echo "Sleeping 240s to let the deploy propagate…"
          sleep 240

      - name: Ping IndexNow (Bing/Yandex/Seznam/Naver)
        if: steps.publish.outputs.published == 'true'
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'http://localhost:3000' }}
        run: pnpm bot:ping || echo "IndexNow ping failed; will retry on next cron"

      - name: Persist drained ping queue
        if: steps.publish.outputs.published == 'true'
        run: |
          if [ -n "$(git status --porcelain bot/memory.json)" ]; then
            git add bot/memory.json
            git commit -m "chore: drain IndexNow ping queue"
            git push
          fi
